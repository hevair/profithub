services:
  - type: web
    name: profithub-api
    runtime: node
    region: sao_paulo
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://seudominio.vercel.app
      - key: PORT
        value: 4000
